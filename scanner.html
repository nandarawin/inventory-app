<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Scanner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2333;
      --border: #2a3045;
      --accent: #00e87a;
      --accent-dim: rgba(0,232,122,0.12);
      --text: #e8eaf0;
      --muted: #6b7280;
      --error-bg: #2a1a1a;
      --error: #f87171;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
      display: flex;
      align-items: flex-end;
      gap: 16px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 22px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    header span {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Camera */
    .video-wrap {
      position: relative;
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16/9;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scan-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Dark overlay via SVG clipPath */
    .scan-box-border {
      position: absolute;
      left: 26%; top: 37%;
      width: 50%; height: 18%;
      border: 2px solid var(--accent);
      border-radius: 6px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    }

    .scan-tag {
      position: absolute;
      left: 26%;
      top: calc(37% - 30px);
      background: var(--accent);
      color: #052916;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 5px;
    }

    /* Corner accents */
    .corner {
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent);
      border-style: solid;
    }
    .corner.tl { top: 37%; left: 26%; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 37%; left: calc(26% + 50%); border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; transform: translateX(-100%); }
    .corner.bl { top: calc(37% + 18%); left: 26%; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; transform: translateY(-100%); }
    .corner.br { top: calc(37% + 18%); left: calc(26% + 50%); border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; transform: translate(-100%, -100%); }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #052916;
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: transparent;
      color: var(--error);
      border: 1px solid #3a2020;
    }

    .btn-danger:hover { background: #2a1a1a; }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--mono);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all 0.2s;
    }

    .status.ok { border-color: #1a3a28; background: #0e2318; color: var(--accent); }
    .status.err { border-color: #3a2020; background: var(--error-bg); color: var(--error); }
    .status.loading { border-color: #2a3045; color: #93c5fd; }

    /* Grid */
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 680px) { .grid2 { grid-template-columns: 1fr; } }

    .preview-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    img.preview {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #000;
      display: block;
      min-height: 80px;
      object-fit: contain;
    }

    canvas { display: none; }

    /* Result */
    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .result-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .part-number {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 2px;
      word-break: break-all;
      min-height: 40px;
    }

    .part-number.empty { color: var(--muted); font-size: 16px; }

    .manual-row {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .manual-row input {
      flex: 1;
      min-width: 200px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
    }

    .manual-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* OCR raw */
    .ocr-raw {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #2a3880;
      border-top-color: #93c5fd;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>// LABEL SCANNER</h1>
    <span>Claude Vision · Part Number Extraction</span>
  </header>

  <!-- API Key Card -->
  <div class="card" id="apiKeyCard">
    <div class="card-title">Anthropic API Key</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input type="password" id="apiKeyInput"
        placeholder="sk-ant-..."
        style="flex:1;min-width:260px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;"
      />
      <button class="btn-primary" onclick="saveKey()">Save Key</button>
    </div>
    <div id="keyStatus" style="margin-top:10px;font-size:12px;color:var(--muted);font-family:var(--mono);">
      Key not set. Enter your key from <a href="https://console.anthropic.com/keys" target="_blank" style="color:var(--accent)">console.anthropic.com/keys</a>
    </div>
  </div>

  <!-- Camera Card -->
  <div class="card">
    <div class="card-title">Live Camera</div>
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-box-border"></div>
      <div class="scan-tag">Align PN row here</div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="startCamera()">Start Camera</button>
      <button class="btn-secondary" onclick="captureAndExtract()">⚡ Scan &amp; Extract</button>
      <button class="btn-danger" onclick="stopCamera()">Stop</button>
    </div>
    <div id="status" class="status">Camera not started.</div>
  </div>

  <!-- Previews -->
  <div class="card">
    <div class="card-title">Capture Previews</div>
    <div class="grid2">
      <div>
        <div class="preview-label">Full Frame</div>
        <img id="snapshot" class="preview" alt="Full frame" />
      </div>
      <div>
        <div class="preview-label">Cropped PN Region</div>
        <img id="cropPreview" class="preview" alt="Cropped region" />
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="card">
    <div class="card-title">Extracted Part Number</div>
    <div class="result-card">
      <div class="result-label">Detected</div>
      <div id="partNumberOutput" class="part-number empty">—</div>
      <div class="manual-row">
        <input type="text" id="manualPartNumber" placeholder="Manual correction if needed" />
        <button class="btn-secondary" onclick="copyPN()">Copy</button>
      </div>
    </div>

    <div style="margin-top:20px">
      <div class="preview-label">Raw Claude Response</div>
      <div id="ocrRaw" class="ocr-raw">No scan yet.</div>
    </div>
  </div>

</div>

<!-- Hidden canvases -->
<canvas id="canvas"></canvas>
<canvas id="cropCanvas"></canvas>

<script>
  let currentStream = null;
  let API_KEY = sessionStorage.getItem("anthropic_key") || "";

  window.addEventListener("DOMContentLoaded", () => {
    if (API_KEY) {
      document.getElementById("apiKeyInput").value = API_KEY;
      document.getElementById("keyStatus").textContent = "✓ Key loaded from session.";
      document.getElementById("keyStatus").style.color = "var(--accent)";
    }
  });

  function saveKey() {
    const val = document.getElementById("apiKeyInput").value.trim();
    if (!val.startsWith("sk-ant-")) {
      document.getElementById("keyStatus").textContent = "⚠ Key should start with sk-ant-";
      document.getElementById("keyStatus").style.color = "var(--error)";
      return;
    }
    API_KEY = val;
    sessionStorage.setItem("anthropic_key", val);
    document.getElementById("keyStatus").textContent = "✓ Key saved for this session.";
    document.getElementById("keyStatus").style.color = "var(--accent)";
  }

  const SCAN_REGION = { x: 0.26, y: 0.37, w: 0.50, h: 0.18 };

  // ── Camera ──────────────────────────────────────────────────────────────────

  async function startCamera() {
    const status = document.getElementById("status");
    const video = document.getElementById("video");

    try {
      if (currentStream) stopCamera();

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });

      currentStream = stream;
      video.srcObject = stream;
      setStatus("Camera started. Align the PN row inside the green box, then press Scan & Extract.", "ok");
    } catch (err) {
      setStatus("Could not access camera: " + err.message, "err");
    }
  }

  function stopCamera() {
    const video = document.getElementById("video");
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    video.srcObject = null;
    setStatus("Camera stopped.", "");
  }

  // ── Capture + Extract (single button) ───────────────────────────────────────

  async function captureAndExtract() {
    const video  = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const crop   = document.getElementById("cropCanvas");

    if (!video.srcObject) { setStatus("Start the camera first.", "err"); return; }

    const W = video.videoWidth, H = video.videoHeight;
    if (!W || !H) { setStatus("Camera not ready yet — wait a moment.", "err"); return; }

    // 1. Full frame
    canvas.width = W; canvas.height = H;
    canvas.getContext("2d").drawImage(video, 0, 0, W, H);
    document.getElementById("snapshot").src = canvas.toDataURL("image/jpeg", 0.92);

    // 2. Crop to full scan-box region (no inner sub-crop)
    const bx = Math.floor(W * SCAN_REGION.x);
    const by = Math.floor(H * SCAN_REGION.y);
    const bw = Math.floor(W * SCAN_REGION.w);
    const bh = Math.floor(H * SCAN_REGION.h);

    // Scale up 3× for better Claude Vision accuracy
    const scale = 3;
    crop.width  = bw * scale;
    crop.height = bh * scale;
    const cctx = crop.getContext("2d");
    cctx.imageSmoothingEnabled = true;
    cctx.imageSmoothingQuality = "high";
    cctx.drawImage(canvas, bx, by, bw, bh, 0, 0, crop.width, crop.height);

    // Light contrast boost — gentler than before
    const img = cctx.getImageData(0, 0, crop.width, crop.height);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      const boosted = Math.max(0, Math.min(255, (gray - 128) * 1.4 + 128));
      d[i] = d[i+1] = d[i+2] = boosted;
    }
    cctx.putImageData(img, 0, 0);

    const cropDataUrl = crop.toDataURL("image/jpeg", 0.95);
    document.getElementById("cropPreview").src = cropDataUrl;

    // 3. Send to Claude Vision
    await extractWithClaude(cropDataUrl);
  }

  // ── Claude Vision ────────────────────────────────────────────────────────────

  async function extractWithClaude(dataUrl) {
    setStatus('<span class="spinner"></span>Sending to Claude Vision…', "loading");
    document.getElementById("partNumberOutput").textContent = "…";
    document.getElementById("ocrRaw").textContent = "Waiting for Claude…";

    // Strip the data URL prefix to get raw base64
    const base64 = dataUrl.split(",")[1];

    const prompt = `You are a part-number extraction assistant for industrial labels.

The image shows a cropped label region. Your ONLY job is to find and return the part number.

The part number format is exactly: NNN-NNNNN-N-ND
Example: 296-11602-1-ND

Rules:
- Return ONLY the part number string, nothing else. No explanation, no punctuation, no quotes.
- If you see something like "PN 296-11602-1-ND" or "P/N: 296-11602-1-ND", return only "296-11602-1-ND".
- The last two characters are always "ND".
- If you cannot find a part number, return exactly: NOT_FOUND`;

    if (!API_KEY) {
      setStatus("⚠ Enter and save your Anthropic API key first.", "err");
      return;
    }

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 100,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: base64 }
              },
              { type: "text", text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        const errMsg = data?.error?.message || JSON.stringify(data);
        setStatus("API error: " + errMsg, "err");
        document.getElementById("ocrRaw").textContent = errMsg;
        document.getElementById("partNumberOutput").textContent = "—";
        document.getElementById("partNumberOutput").className = "part-number empty";
        return;
      }

      const raw = (data.content || []).map(b => b.text || "").join("").trim();
      document.getElementById("ocrRaw").textContent = raw;

      if (!raw || raw === "NOT_FOUND") {
        document.getElementById("partNumberOutput").textContent = "Not found — adjust label and retry";
        document.getElementById("partNumberOutput").className = "part-number empty";
        setStatus("No part number detected. Try repositioning the label.", "err");
      } else {
        document.getElementById("partNumberOutput").textContent = raw;
        document.getElementById("partNumberOutput").className = "part-number";
        document.getElementById("manualPartNumber").value = raw;
        setStatus("✓ Part number extracted: " + raw, "ok");
      }

    } catch (err) {
      setStatus("Network error: " + err.message, "err");
      document.getElementById("ocrRaw").textContent = err.message;
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.innerHTML = msg;
    el.className = "status" + (type ? " " + type : "");
  }

  function copyPN() {
    const val = document.getElementById("manualPartNumber").value || document.getElementById("partNumberOutput").textContent;
    if (val && val !== "—") {
      navigator.clipboard.writeText(val).then(() => setStatus("Copied: " + val, "ok"));
    }
  }
</script>
</body>
</html>
