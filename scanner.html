<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
      color: #1f3b73;
    }

    video, canvas, img {
      width: 100%;
      max-width: 640px;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      background: black;
      display: block;
      margin-bottom: 16px;
    }

    button {
      background-color: #1f5fbf;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      margin-top: 14px;
      margin-right: 10px;
    }

    button:hover {
      background-color: #184d9c;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #eef4ff;
      border: 1px solid #cfe0ff;
    }

    .error {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #fdeaea;
      color: #a12626;
      border: 1px solid #efb4b4;
    }

    .section {
      margin-top: 24px;
    }

    canvas {
      display: none;
    }

    #snapshot {
      background: #f8fafc;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      resize: vertical;
      background: #fff;
    }

    .small-note {
      color: #555;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Label Scanner</h1>
    <p>Step 3: capture one frame and extract text with OCR.</p>

    <h2>Live Camera</h2>
    <video id="video" autoplay playsinline></video>

    <div>
      <button onclick="startCamera()">Start Camera</button>
      <button onclick="stopCamera()">Stop Camera</button>
      <button onclick="captureFrame()">Scan</button>
      <button onclick="extractText()">Extract Text</button>
    </div>

    <div id="status" class="message">Camera not started.</div>

    <div class="section">
      <h2>Captured Image</h2>
      <canvas id="canvas"></canvas>
      <img id="snapshot" alt="Captured frame will appear here" />
    </div>

    <div class="section">
      <h2>Extracted Text</h2>
      <textarea id="ocrText" placeholder="OCR result will appear here..."></textarea>
      <div class="small-note">
        OCR may take a few seconds. Wait until the status says it is complete.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script>
    let currentStream = null;

    async function startCamera() {
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          status.className = "error";
          status.textContent = "Camera access is not supported in this browser.";
          return;
        }

        if (currentStream) {
          stopCamera();
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment"
          },
          audio: false
        });

        currentStream = stream;
        video.srcObject = stream;

        status.className = "message";
        status.textContent = "Camera started successfully.";
      } catch (error) {
        status.className = "error";
        status.textContent = "Could not access camera: " + error.message;
      }
    }

    function stopCamera() {
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }

      video.srcObject = null;
      status.className = "message";
      status.textContent = "Camera stopped.";
    }

    function captureFrame() {
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const snapshot = document.getElementById("snapshot");
      const status = document.getElementById("status");

      if (!video.srcObject) {
        status.className = "error";
        status.textContent = "Start the camera first.";
        return;
      }

      const width = video.videoWidth;
      const height = video.videoHeight;

      if (!width || !height) {
        status.className = "error";
        status.textContent = "Camera is not ready yet. Wait a moment and try again.";
        return;
      }

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, width, height);

      const imageDataUrl = canvas.toDataURL("image/png");
      snapshot.src = imageDataUrl;

      status.className = "message";
      status.textContent = "Frame captured successfully.";
    }

    async function extractText() {
      const snapshot = document.getElementById("snapshot");
      const ocrText = document.getElementById("ocrText");
      const status = document.getElementById("status");

      if (!snapshot.src) {
        status.className = "error";
        status.textContent = "Capture an image first.";
        return;
      }

      ocrText.value = "";
      status.className = "message";
      status.textContent = "Running OCR... please wait.";

      try {
        const result = await Tesseract.recognize(snapshot.src, "eng", {
          logger: m => {
            if (m.status === "recognizing text") {
              const percent = Math.round((m.progress || 0) * 100);
              status.textContent = "Running OCR... " + percent + "%";
            }
          }
        });

        ocrText.value = result.data.text || "";
        status.className = "message";
        status.textContent = "OCR complete.";
      } catch (error) {
        status.className = "error";
        status.textContent = "OCR failed: " + error.message;
      }
    }
  </script>
</body>
</html>
