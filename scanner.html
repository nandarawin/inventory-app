<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #1f3b73;
    }

    video {
      width: 100%;
      max-width: 640px;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      background: black;
    }

    button {
      background-color: #1f5fbf;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      margin-top: 14px;
      margin-right: 10px;
    }

    button:hover {
      background-color: #184d9c;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #eef4ff;
      border: 1px solid #cfe0ff;
    }

    .error {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #fdeaea;
      color: #a12626;
      border: 1px solid #efb4b4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Label Scanner</h1>
    <p>Step 1: open the camera and show live preview.</p>

    <video id="video" autoplay playsinline></video>

    <div>
      <button onclick="startCamera()">Start Camera</button>
      <button onclick="stopCamera()">Stop Camera</button>
    </div>

    <div id="status" class="message">Camera not started.</div>
  </div>

  <script>
    let currentStream = null;

    async function startCamera() {
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          status.className = "error";
          status.textContent = "Camera access is not supported in this browser.";
          return;
        }

        if (currentStream) {
          stopCamera();
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment"
          },
          audio: false
        });

        currentStream = stream;
        video.srcObject = stream;

        status.className = "message";
        status.textContent = "Camera started successfully.";
      } catch (error) {
        status.className = "error";
        status.textContent = "Could not access camera: " + error.message;
      }
    }

    function stopCamera() {
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }

      video.srcObject = null;
      status.className = "message";
      status.textContent = "Camera stopped.";
    }
  </script>
</body>
</html>
